name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "**/*.swift"
      - "**/*.xcodeproj/**"
      - "Editor/**"
      - "Resources/**"
      - ".github/workflows/build-unsigned-ipa.yml"
  pull_request:
    paths:
      - "**/*.swift"
      - "**/*.xcodeproj/**"
      - "Editor/**"
      - "Resources/**"
      - ".github/workflows/build-unsigned-ipa.yml"

permissions:
  contents: read

jobs:
  build-ios:
    name: Build unsigned iOS IPA
    runs-on: macos-26
    timeout-minutes: 